name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-test:version-${{ github.run_number }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-test:version-${{ github.run_number }}

      - name: Execute remote SSH commands using password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: whoami
      
      - name: Stop Docker image
        run: docker stop devops-test
      
      -name: Remove Docker image
        run: docker rm devops-test
      
      -name: Pull Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/devops-test:version-${{ github.run_number }}
      
      -name: Run Docker image
        run: docker run -d -p --name devops-test 80:80 ${{ secrets.DOCKER_USERNAME }}/devops-test:version-${{ github.run_number }}